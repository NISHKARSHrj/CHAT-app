<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Chat</title>
</head>
<body>
    <div class="app">
        <div class="header">
            <span class="header-title">Chat</span>
            <div class="user-setup">
                <select id="userSelect" onchange="selectExistingUser()">
                    <option value="">Select user...</option>
                </select>
                <button onclick="showSignup()">+ New</button>
            </div>
        </div>

        <div id="signup-bar" class="signup-bar" style="display:none;">
            <input id="newUsername" placeholder="Enter your name" />
            <button onclick="createUser()">Join</button>
            <button onclick="hideSignup()">Cancel</button>
        </div>

        <div id="joined-bar" class="joined-bar" style="display:none;">
            <span id="joined-label">Chatting as ...</span>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-area">
            <input id="messageInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
